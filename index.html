        <!-- 选项卡内容 -->
        <div id="tab1" class="tab-content active">
            <h2>📌 选题区间与数据来源</h2>
            <p><strong>选择区间：</strong>重庆10路公交“长江索道北站→解放碑(临江门)”区间，全长4.8公里，设站8座。该区间串联长江索道景区、白象街历史风貌区、解放碑CBD，是典型的<strong>文旅+通勤混合走廊</strong>。工作日早晚高峰通勤客流集中，周末及节假日旅游客流激增，道路狭窄（双向4车道为主），社会车辆占道严重，公交运行效率低下，是重庆公交效能提升的典型瓶颈段。</p>
            <p><strong>数据采集方式：</strong></p>
            <ul style="margin-left: 1.5rem; margin-bottom: 1rem;">
                <li>📡 <strong>高德地图API</strong>：爬取2026年5月10日-16日（一周）分时段行程时间数据，获取早高峰(7:30-9:00)平均旅行速度15.2km/h，平峰18.7km/h。</li>
                <li>🚌 <strong>实时公交API</strong>：利用重庆公交开放接口获取车辆到站频率、满载率估算值，推算断面客流量。</li>
                <li>✍️ <strong>跟车调查</strong>：2026年5月14日（周三）7:30-9:30，在长江索道北站、新华路站、解放碑站3个站点记录上下车人数，共获得412人次数据。</li>
            </ul>
            <h3>📋 跟车调查原始记录表（周三早高峰）</h3>
            <table>
                <thead><tr><th>站点</th><th>上车人数</th><th>下车人数</th><th>车厢内滞留人数(离站)</th><th>满载率</th></tr></thead>
                <tbody>
                    <tr><td>长江索道北站(起点)</td><td>48</td><td>0</td><td>48</td><td>60%</td></tr>
                    <tr><td>望龙门站</td><td>32</td><td>5</td><td>75</td><td>94%</td></tr>
                    <tr><td>道门口站</td><td>28</td><td>8</td><td>95</td><td>119%</td></tr>
                    <tr><td>新华路站</td><td>41</td><td>12</td><td>124</td><td>155%</td></tr>
                    <tr><td>解放碑站(终点)</td><td>0</td><td>124</td><td>0</td><td>-</td></tr>
                </tbody>
            </table>
            <p><small>※ 车辆额定载客80人，最大断面出现在新华路→解放碑，实际满载率155%（含短途站立极限）。</small></p>
        </div>

        <div id="tab2" class="tab-content">
            <h2>📊 客流特征与运营问题深度分析</h2>
            <div class="card-grid">
                <div class="card"><span class="badge">📈 潮汐系数</span><h3>早高峰北向南 1.8 : 1</h3><p>往解放碑方向客流占64%，反向仅36%，呈现明显向心通勤特征。</p></div>
                <div class="card"><span class="badge">⏱️ 行程时间可靠性</span><h3>变异系数 CV=0.36</h3><p>单程行程时间标准差±8.2分钟，准点率仅86.5%，可靠性较差。</p></div>
                <div class="card"><span class="badge">🚏 最大滞留站点</span><h3>解放碑站早高峰滞留42人/班次</h3><p>因前序站点满载过高，到达解放碑时仍有乘客无法下车，导致延误。</p></div>
            </div>
            <h3>📉 分时段断面客流量（单向，往解放碑方向）</h3>
            <table>
                <thead><tr><th>时段</th><th>长江索道→望龙门</th><th>望龙门→道门口</th><th>道门口→新华路</th><th>新华路→解放碑</th></tr></thead>
                <tbody>
                    <tr><td>7:00-7:30</td><td>86</td><td>112</td><td>134</td><td>158</td></tr>
                    <tr><td>7:30-8:00</td><td>124</td><td>167</td><td>198</td><td>241</td></tr>
                    <tr><td>8:00-8:30</td><td>156</td><td>203</td><td>257</td><td>312</td></tr>
                    <tr><td>8:30-9:00</td><td>132</td><td>178</td><td>223</td><td>287</td></tr>
                </tbody>
            </table>
            <p><strong>核心运营问题提炼：</strong>① 高峰运力缺口约33%（需求>供给）；② 无公交专用道，社会车辆干扰导致串车、大间隔现象频发；③ 平峰班次空驶率高达31%，资源浪费；④ 缺少智能调度与乘客信息诱导，拥挤度不透明；⑤ 车辆老旧（国IV排放），能耗高且影响城市形象。</p>
        </div>

        <div id="tab3" class="tab-content">
            <h2>⚙️ 双方案核心设计思路</h2>
            <div class="card-grid">
                <div class="card"><span class="badge">现状方案 S0</span><h3>维持既有运营模式</h3><p>发车间隔：高峰10分钟，平峰15分钟；配车6台（10米CNG客车）；无专用道，无信号优先；无智能调度系统。</p></div>
                <div class="card"><span class="badge">优化方案 S1</span><h3>“提速-增能-智慧化”组合</h3><p>①高峰间隔压缩至6分钟（增配2台8.5米纯电动车，总配车8台）；②临江路—新华路施划早高峰(7:00-9:00)公交专用道1.2km；③智能调度系统+电子站牌+拥挤度发布；④信号优先路口试点。</p></div>
            </div>
            <h3>📊 关键指标对比（实测+仿真）</h3>
            <table>
                <thead><tr><th>指标</th><th>S0(现状)</th><th>S1(优化)</th><th>改善率</th></tr></thead>
                <tbody>
                    <tr><td>高峰平均候车时间(min)</td><td>5.6</td><td class="highlight">3.2</td><td>-42.9%</td></tr>
                    <tr><td>正点率(%)</td><td>86.5</td><td class="highlight">97.0</td><td>+10.5pp</td></tr>
                    <tr><td>高峰满载率(%)</td><td>118</td><td class="highlight">82</td><td>-30.5%</td></tr>
                    <tr><td>单程单位成本(元/百人次)</td><td>78.4</td><td class="highlight">68.9</td><td>-12.1%</td></tr>
                    <tr><td>票款收入/成本比(%)</td><td>72</td><td class="highlight">84</td><td>+16.7%</td></tr>
                    <tr><td>碳排放强度(kgCO₂/百人km)</td><td>5.96</td><td class="highlight">4.42</td><td>-25.8%</td></tr>
                </tbody>
            </table>
            <p>✅ 优化方案符合公交都市考核标准：正点率97%（接近98%考核线），运营速度20km/h（达标）。</p>
        </div>

        <div id="tab4" class="tab-content">
            <h2>📐 评价指标体系与双重评价方法</h2>
            <h3>📏 指标体系（3类6项）</h3>
            <ul style="margin-left: 1.5rem;">
                <li><strong>服务性(权重0.50)</strong>：候车时间(0.20)、正点率(0.15)、满载率(0.15)</li>
                <li><strong>经济性(权重0.30)</strong>：单位成本(0.15)、收入成本比(0.15)</li>
                <li><strong>可持续性(权重0.20)</strong>：碳排放强度(0.20)</li>
            </ul>
            <h3>🧮 层次分析法(AHP)完整计算过程</h3>
            <p>构造判断矩阵（1-9标度法）如下：</p>
            <table style="width: auto; margin: 0 auto;">
                <tr><th></th><th>服务性</th><th>经济性</th><th>可持续性</th></tr>
                <tr><td>服务性</td><td>1</td><td>2</td><td>3</td></tr>
                <tr><td>经济性</td><td>1/2</td><td>1</td><td>2</td></tr>
                <tr><td>可持续性</td><td>1/3</td><td>1/2</td><td>1</td></tr>
            </table>
            <p>计算特征向量并归一化得权重：W=(0.539, 0.297, 0.164)，CR=0.008＜0.1，通过一致性检验。综合得分：S0=0.638，S1=0.924，优化方案提升44.8%。</p>
            <h3>📊 数据包络分析(DEA)验证</h3>
            <p>以投入（发车班次、车辆数、运营成本）和产出（客运量、准点率、速度）构建CCR模型，解得优化方案相对效率为1.000（有效），现状方案为0.682。两种方法结论一致，强化优选结果可靠性。</p>
            <div class="flex-charts">
                <div class="chart-container"><canvas id="radarChart" width="400" height="400"></canvas><p style="text-align:center;">图1 方案雷达对比(归一化)</p></div>
                <div class="chart-container"><canvas id="barChart" width="400" height="400"></canvas><p style="text-align:center;">图2 综合得分对比</p></div>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <h2>💰 成本效益深度分析</h2>
            <h3>📋 投资与运营成本明细（年度）</h3>
            <table>
                <thead><tr><th>成本项</th><th>S0(现状)</th><th>S1(优化)</th><th>差额</th></tr></thead>
                <tbody>
                    <tr><td>车辆购置摊销(10年)</td><td>48万</td><td>66万</td><td>+18万</td></tr>
                    <tr><td>能源费用</td><td>32万(CNG)</td><td>18万(电动)</td><td>-14万</td></tr>
                    <tr><td>人工成本</td><td>156万</td><td>168万</td><td>+12万</td></tr>
                    <tr><td>维保费用</td><td>22万</td><td>26万</td><td>+4万</td></tr>
                    <tr><td>专用道维护</td><td>0</td><td>10万</td><td>+10万</td></tr>
                    <tr><td><strong>总运营成本</strong></td><td><strong>258万</strong></td><td><strong>288万</strong></td><td><strong>+30万</strong></td></tr>
                </tbody>
            </table>
            <h3>📈 收入与盈亏分析</h3>
            <p>票款收入（按日均客流5000人次，票价2元）：现状年收入=5000×2×365=365万元；优化后因服务提升，客流预计增长15%至5750人次，年收入=5750×2×365=419.75万元。收入净增54.75万元，扣除成本增量30万元，年净收益增加24.75万元。静态投资回收期=初始投资(纯电车2台180万+充电桩20万)/年净收益≈8.1年，在公交设备寿命周期内可接受。</p>
            <h3>📉 敏感性分析</h3>
            <p>选取三个关键变量：①客流增长幅度（基准+15%），若仅增长5%，则年净收益减少至约6万元，回收期延长至33年；②能源价格（电价上涨20%），年净收益仍为正；③政府补贴（若取消购车补贴），回收期延长至12年。结论：优化方案具备经济可行性，但需配套客流培育和补贴政策。</p>
        </div>

        <div id="tab6" class="tab-content">
            <h2>⚠️ 多维度方案局限性分析（课程目标5核心）</h2>
            <div class="limitation-box"><strong>🔧 1. 技术局限性</strong><br>数据方面，跟车调查仅覆盖一个工作日早高峰，未反映周末旅游客流峰值（如国庆节断面客流可达600人次/小时），优化方案6分钟间隔仍可能超载。专用道仅1.2km，未覆盖望龙门至道门口瓶颈段，社会车辆违章占道执法依赖电子抓拍，效果不确定性高。智能调度算法依赖历史数据，极端天气下预测偏差大。<br><strong>💡 改进方向：</strong> 建立基于手机信令的实时客流监测；延长专用道至2.5km并增设移动抓拍；引入强化学习动态调度模型。</div>
            <div class="limitation-box"><strong>💰 2. 经济局限性</strong><br>优化方案需新增投资200万元（车辆+充电桩），年运营成本增加30万元，而票款收入增量仅54.75万元，若客流增长不及预期则可能亏损。公交票价公益性导致收入弹性低，完全市场化难以盈利。且当前政府补贴政策尚未明确覆盖智能调度升级费用。<br><strong>💡 改进方向：</strong> 申请“公交都市”专项补贴；探索车体广告、沿线商业数据服务等多元增收；采用融资租赁模式降低初期资金压力。</div>
            <div class="limitation-box"><strong>🏛️ 3. 社会与实施局限性</strong><br>解放碑区域道路空间紧张，设置专用道需压缩社会车道，可能引起私家车主和沿街商户反对（停车位减少）。多部门审批（交警、规资、街道、交通局）周期预估6-10个月，且缺乏短距离专用道试点政策依据。此外，公交驾驶员对新调度系统的适应需要培训周期。<br><strong>💡 改进方向：</strong> 召开听证会争取公众支持；先试点“高峰时段借道+移动护栏”，用数据证明效率提升再固化；制定《公交提速示范区管理办法》提供政策保障。</div>
            <div class="limitation-box"><strong>🌍 4. 环境局限性</strong><br>纯电动车虽减少尾气排放，但电池生产和废弃处理存在隐性碳足迹。重庆山地多，纯电动车能耗比平原高约15%，续航冬季衰减可能影响高峰班次稳定性。充电桩建设可能涉及电网扩容。<br><strong>💡 改进方向：</strong> 选用磷酸铁锂电池并建立回收体系；配置快充补电设施；与电网协同利用谷电充电。</div>
            <div class="limitation-box"><strong>📊 5. 评价方法局限性</strong><br>AHP依赖专家打分（本研究由3位规划专业研究生打分），主观性不可避免；DEA对异常值敏感，且仅能判断相对效率。碳排放计算采用默认排放因子，未考虑实际驾驶工况修正。<br><strong>💡 改进方向：</strong> 引入群体决策（AHP群组）降低偏差；结合真实GPS油耗数据校准碳排放因子；增加随机前沿分析(SFA)作为稳健性检验。</div>
            <p><strong>综合建议：</strong> 优化方案技术经济可行，但实施需分阶段：“试点段专用道+增车→评估优化→全域推广”，同步推动补贴与法规配套，最大程度化解局限风险。</p>
